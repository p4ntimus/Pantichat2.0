<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PantiChat Login</title>
    <style>
        body {
            margin: 0;
            background: #0d0d0d;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            font-family: Arial, sans-serif;
        }
        .box {
            background: #1a1a1a;
            padding: 30px;
            border-radius: 12px;
            width: 300px;
            text-align: center;
            box-shadow: 0 0 20px rgba(255,0,255,0.3);
        }
        input, button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border-radius: 6px;
            border: none;
        }
        button {
            background: #ff00ff;
            color: white;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>PantiChat</h2>
    <input id="username" type="text" placeholder="Dein Name">
    <button onclick="enterChat()">Betreten</button>
</div>

<script src="login.js"></script>
</body>
</html>
